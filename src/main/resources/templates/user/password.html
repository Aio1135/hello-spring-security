<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background: linear-gradient(90deg, #1a1a2e, #0f3460);
        }

        .navbar-brand {
            font-weight: 800;
            color: #e94560 !important;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/home}">HanSung</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                </ul>
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 500px;">
        <h3 class="mb-4 fw-bold">비밀번호 변경</h3>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-bold">현재 비밀번호</label>
                        <input type="password" th:field="*{currentPassword}" class="form-control"
                            th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('currentPassword')}"
                            th:errors="*{currentPassword}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">새 비밀번호</label>
                        <input type="password" th:field="*{newPassword}" class="form-control"
                            th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}"
                            th:errors="*{newPassword}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">새 비밀번호 확인</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-control"
                            th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                            th:errors="*{confirmPassword}"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-semibold">비밀번호 변경</button>
                    <a th:href="@{/home}" class="btn btn-outline-secondary w-100 mt-2">취소</a>
                </form>
            </div>
        </div>

        <div class="text-center mt-5 mb-4 text-muted" style="font-size: 0.9em;">
            <span th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
            <span> | 학번: 2171216 | 성명: 심승민</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
