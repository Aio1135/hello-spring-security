<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5" style="max-width: 600px;">
        <h3 class="mb-4 fw-bold">상품 수정</h3>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-bold">상품명</label>
                        <input type="text" th:field="*{name}" class="form-control"
                            th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">오류 메시지
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">설명</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">가격</label>
                            <input type="number" th:field="*{price}" class="form-control"
                                th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">오류
                                메시지</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">재고</label>
                            <input type="number" th:field="*{stock}" class="form-control"
                                th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}">오류
                                메시지</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a th:href="@{/products}" class="btn btn-secondary px-4">취소</a>
                        <button type="submit" class="btn btn-primary px-4">수정 완료</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="text-center mt-5 mb-4 text-muted" style="font-size: 0.9em;">
            <span th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
            <span> | 학번: 2171216 | 성명: 심승민</span>
        </div>
    </div>

</body>

</html>
